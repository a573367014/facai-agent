services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # MinIO：S3 兼容的本地对象存储，用于图片上传。
  # 开发时连 localhost:9000，生产时把 endpoint 改成 R2/S3 即可，代码不用动。
  # 控制台: http://localhost:9001 （账号 minioadmin / minioadmin）
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  # OpenTelemetry 一站式后端：grafana/otel-lgtm
  # 内含 OTel Collector + Prometheus + Tempo + Loki + Pyroscope + Grafana
  # Grafana UI: http://localhost:3000 （账号 admin / admin）
  # OTLP HTTP: http://localhost:4318
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - lgtm-data:/data

volumes:
  redis-data:
  postgres-data:
  lgtm-data:
  minio-data:

